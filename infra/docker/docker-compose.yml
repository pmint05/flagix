version: "3.8"

services:
  postgres:
    image: postgres:18-alpine
    container_name: flagix_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: flagix
      POSTGRES_PASSWORD: root
      POSTGRES_DB: flagix_dev
    volumes:
      - flagix_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flagix -d flagix_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: flagix_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - flagix_redis_data:/data
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 256mb 
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  flagix_pg_data:
    name: flagix_pg_data
  flagix_redis_data:
    name: flagix_redis_data
