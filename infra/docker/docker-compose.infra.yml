services:
  flagix-postgres:
    image: postgres:18-alpine
    container_name: flagix-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - flagix_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  flagix-redis:
    image: redis:8-alpine
    container_name: flagix-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - flagix_redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  flagix_pg_data:
    name: flagix_pg_data
  flagix_redis_data:
    name: flagix_redis_data
